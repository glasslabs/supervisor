version: 2
project_name: supervisor
dist: dist

gomod:
  proxy: true

builds:
  - main: ./cmd/supervisor
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats: ["binary"]

changelog:
  disable: true

checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'

snapshot:
  version_template: "{{ .Tag }}"